name: Issue Bot
on:
  issues:
    types: [opened]

jobs:
  auto-response:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for opening an issue! We will look into it as soon as possible. In the meantime, please make sure you have provided enough context, such as steps to reproduce and platform details (iOS/Android)."
            })
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['triage']
            })
